name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Server: typecheck, verify DB introspection matches committed types,
  # and verify the committed SDL matches what Pothos would print right now.
  server:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chores
          POSTGRES_PASSWORD: chores
          POSTGRES_DB: chores
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U chores"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://chores:chores@localhost:5432/chores
      JWT_SECRET: ci-secret

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Apply migrations
        run: bun run migrate

      - name: Typecheck
        run: bun run typecheck

      - name: Verify src/db/generated.ts matches live schema
        run: bun run db:types:verify

      - name: Regenerate SDL and check for drift
        run: |
          bun run schema
          git diff --exit-code schema.graphql \
            || { echo "::error::server/schema.graphql is out of date. Run 'bun run sync' and commit the result."; exit 1; }

  # Client: regenerate Dart from the schema, check nothing drifted, and run
  # the Flutter analyzer. The analyzer is what actually catches a
  # server-side breaking change: if Pothos drops a field, codegen removes
  # it from the Dart class, and any screen that referenced it fails to
  # compile here.
  client:
    runs-on: ubuntu-latest
    needs: server

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Resync SDL server → app so we diff against a fresh copy.
      - name: Sync schema from server
        working-directory: server
        run: |
          bun install --frozen-lockfile
          bun run sync

      - name: Check synced schema is committed
        run: |
          git diff --exit-code lib/graphql/schema.graphql \
            || { echo "::error::app/lib/graphql/schema.graphql is out of date. Run 'bun run sync' in server/ and commit the result."; exit 1; }

      - run: flutter pub get

      - name: Regenerate GraphQL Dart and check for drift
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code 'lib/graphql/**/*.graphql.dart' \
            || { echo "::error::Generated Dart is out of date. Run 'dart run build_runner build --delete-conflicting-outputs' and commit."; exit 1; }

      - name: Analyze (end-to-end static check)
        run: flutter analyze

      - name: Test
        run: flutter test
