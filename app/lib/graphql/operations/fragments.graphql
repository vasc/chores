fragment UserFields on User {
  id
  householdId
  name
  role
  avatarEmoji
  tokenBalance
  xp
  level
  xpIntoLevel
  xpForNextLevel
  streakDays
  email
}

fragment ChoreFields on Chore {
  id
  title
  description
  tokenValue
  xpValue
  recurrence
  archived
  createdAt
}

fragment AssignmentFields on ChoreAssignment {
  id
  status
  dueDate
  submittedAt
  approvedAt
  rejectReason
  createdAt
  combo
  chore { ...ChoreFields }
  assignedTo { ...UserFields }
}

fragment RewardFields on Reward {
  id
  title
  description
  tokenCost
  archived
  createdAt
}

fragment RedemptionFields on Redemption {
  id
  status
  tokensSpent
  requestedAt
  decidedAt
  decisionReason
  reward { ...RewardFields }
  user { ...UserFields }
}

fragment LootDropFields on LootDrop {
  id
  rarity
  status
  isQuestBonus
  itemEmoji
  itemLabel
  itemDescription
  createdAt
  committedAt
  assignmentId
}

fragment DailyQuestFields on DailyQuest {
  id
  questDate
  goal
  progress
  rewardClaimedAt
  rewardDrop { ...LootDropFields }
}
