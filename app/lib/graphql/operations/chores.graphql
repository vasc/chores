mutation CreateChore(
  $title: String!
  $description: String
  $tokenValue: Int!
  $xpValue: Int
  $recurrence: Recurrence = one_off
) {
  createChore(
    title: $title
    description: $description
    tokenValue: $tokenValue
    xpValue: $xpValue
    recurrence: $recurrence
  ) { ...ChoreFields }
}

mutation UpdateChore(
  $id: UUID!
  $title: String
  $description: String
  $tokenValue: Int
  $xpValue: Int
  $recurrence: Recurrence
) {
  updateChore(
    id: $id
    title: $title
    description: $description
    tokenValue: $tokenValue
    xpValue: $xpValue
    recurrence: $recurrence
  ) { ...ChoreFields }
}

mutation ArchiveChore($id: UUID!) {
  archiveChore(id: $id) { ...ChoreFields }
}

mutation AssignChore(
  $choreId: UUID!
  $assignedToUserId: UUID!
  $dueDate: DateTime
) {
  assignChore(
    choreId: $choreId
    assignedToUserId: $assignedToUserId
    dueDate: $dueDate
  ) { ...AssignmentFields }
}

mutation SubmitChore($assignmentId: UUID!) {
  submitChore(assignmentId: $assignmentId) {
    assignment { ...AssignmentFields }
    lootDrop { ...LootDropFields }
  }
}

mutation ApproveChore($assignmentId: UUID!) {
  approveChore(assignmentId: $assignmentId) {
    assignment { ...AssignmentFields }
    lootDrop { ...LootDropFields }
    questBonus { ...LootDropFields }
    quest { ...DailyQuestFields }
    user { ...UserFields }
  }
}

mutation RejectChore($assignmentId: UUID!, $reason: String) {
  rejectChore(assignmentId: $assignmentId, reason: $reason) {
    ...AssignmentFields
  }
}
